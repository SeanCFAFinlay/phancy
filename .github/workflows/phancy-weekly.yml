name: Phancy Weekly Batch

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

jobs:
  weekly-batch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: node scripts/prepare-weekly-batch.mjs
      - run: npm run sync
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: weekly phancy batch"
          git push